services:
  - type: web
    name: raahione-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package
    startCommand: java -jar target/*.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false